<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>News Card</title>
</head>

<body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center;">

<!-- CANVAS -->
<div style="position: relative; width:1080px; height:1080px; overflow:hidden;">

  <!-- DYNAMIC IMAGE (URL থেকে আসবে) -->
  <img id="mainImg"
    style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
    " />

  <!-- FIXED PNG FRAME -->
  <img src="YOUR_PNG_FRAME_URL"
    style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:2;
    " />

  <!-- TITLE -->
  <div id="titleText"
    style="
      position:absolute;
      bottom:230px;
      left:50px;
      right:50px;
      z-index:3;
      color:white;
      font-size:42px;
      font-weight:bold;
      text-align:center;
      text-shadow:
        -3px -3px 0 red,
         3px -3px 0 red,
        -3px  3px 0 red,
         3px  3px 0 red;
    ">
  </div>

</div>

<!-- SCRIPT: URL থেকে data নিবে -->
<script>
const params = new URLSearchParams(window.location.search);

// image
document.getElementById("mainImg").src = params.get("img");

// title
document.getElementById("titleText").innerText = decodeURIComponent(params.get("title") || "");
</script>

</body>
</html>
