<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>News Card</title>
</head>

<body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center;">

<!-- 1080x1080 CANVAS -->
<div style="position: relative; width:1080px; height:1080px; overflow:hidden;">

  <!-- DYNAMIC IMAGE -->
  <img id="mainImg"
    style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
    " />

  <!-- FIXED PNG FRAME -->
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjKqEvDkxNuuBLQy0paMBOeQMc3xncdmII3PTeYxAoOWubp-OLD7nEKtVaEQKZrVOdS20g64oOrDTEcmHgNTX03YIkBPoUMEBYMbheZkbYmo3rlrVZWxZNtOyKTmAq9oacRL4zlt0i885JAFwqOI7eJGJftDiK1YuUXCuO0ky5u5UrVZTUXctbd_5ZumOlB/s1080/News%20Format.png"
    style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:2;
    " />

  <!-- TITLE -->
  <div id="titleText"
    style="
      position:absolute;
      bottom:230px;
      left:50px;
      right:50px;
      z-index:3;
      color:white;
      font-size:42px;
      font-weight:bold;
      text-align:center;
      text-shadow:
        -3px -3px 0 red,
         3px -3px 0 red,
        -3px  3px 0 red,
         3px  3px 0 red;
    ">
  </div>

</div>

<!-- URL PARSER SCRIPT -->
<script>
const p = new URLSearchParams(window.location.search);

// image set
const img = p.get("img");
if(img){
  document.getElementById("mainImg").src = img;
}

// title set
const title = p.get("title");
if(title){
  document.getElementById("titleText").innerText = decodeURIComponent(title);
}
</script>

</body>
</html>
